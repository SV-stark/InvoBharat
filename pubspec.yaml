name: invobharat
description: A cross-platform invoice generator for India.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.10.8
  printing: ^5.11.0
  intl: ^0.20.2
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.3.0
  go_router: ^17.2.2
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  image_picker: ^1.2.1
  uuid: ^4.5.2
  fluent_ui: ^4.12.0
  file_picker: ^10.3.10
  fl_chart: ^1.1.1

  # Database
  drift: ^2.14.0
  sqlite3: ^2.9.4
  path: ^1.9.0
  csv: ^6.0.0

  archive: ^4.0.7
  url_launcher: ^6.3.2

  qr_flutter: ^4.1.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  mailer: ^6.0.0
  flutter_secure_storage: ^9.2.4
  http: ^1.3.0
  package_info_plus: ^8.3.1

  share_plus: ^10.0.0
  indian_formatters: ^0.0.1
  money2: ^6.3.0
  drift_flutter: ^0.2.8
  gap: ^3.0.1
  skeletonizer: ^2.1.3
  file_saver: ^0.3.1
  talker_flutter: ^4.8.4
  riverpod_annotation: ^4.0.2
  flutter_riverpod: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.14.0
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  drift_dev: ^2.30.1
  mocktail: ^1.0.4



  path_provider_platform_interface: any
  plugin_platform_interface: any
  riverpod_generator: ^4.0.3
flutter_launcher_icons:
  android: false
  ios: false
  image_path: "logo.png"
  windows:
    generate: true
    icon_size: 48
  linux: true

flutter:
  uses-material-design: true
  assets: 
    - logo.png
    - fonts/NotoSans-Regular.ttf
  fonts:
    - family: NotoSans
      fonts:
        - asset: fonts/NotoSans-Regular.ttf
